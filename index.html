<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- tailwind CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font CDN -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- css link -->
     <link rel="stylesheet" href="./style/job.css">

     <style>
        *{
            font-family: "Geist", sans-serif;
        }
     </style>

</head>
<body class="bg-gray100/30 max-w-[1110px] mx-auto">

    <!-- header section -->

    <header class="mx-auto space-y-5 mt-15 mb-[30px]">
        <h1 class="text-3xl font-bold text-[#002c5cFF] mb-5">Job Application Tracker</h1>
        
        <div class="grid grid-cols-3 gap-8">
            
            <div class="bg-white w-88 p-5 shadow-md rounded-lg border-[f1f2f4]">
                <p class="text-[#323b49FF] font-medium text-[14px]">Total</p>
                <h2 class=" text-black font-bold text-2xl" id="total">0</h2>
            </div>
            
            <div class="bg-white w-88 p-5 shadow-md rounded-lg border-[f1f2f4]">
                <p class="text-[#323b49FF] font-medium text-[14px]">Interview</p>
                <h2 class="text-[#10B981] font-bold text-2xl" id="interviewCount">0</h2>
            </div>
            
            <div class="bg-white w-88 p-5 shadow-md rounded-lg border-[f1f2f4]">
                <p class="text-[#323b49FF] font-medium text-[14px]">Rejected</p>
                <h2 class="text-[#ef4444] font-bold text-2xl" id="rejectCount">0</h2>
            </div>
        </div>
    </header>


    <hr class="border-[#e6e7e9FF]">

    <!-- main section -->


    
</body>
</html>
